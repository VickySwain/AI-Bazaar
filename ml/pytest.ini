[pytest]
testpaths = tests
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=ml
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    -p no:warnings
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (requires running services)
    slow: Tests that take > 5s
