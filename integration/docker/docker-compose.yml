version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
#  CoverAI — Full Stack Compose
#  Services: frontend (Next.js) → backend (NestJS) → ml (FastAPI) → infra
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: coverai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coverai
      POSTGRES_PASSWORD: coverai_secret
      POSTGRES_DB: coverai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coverai -d coverai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: coverai-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: coverai-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: coverai-kafka
    restart: unless-stopped
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: coverai-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    logging: *default-logging

  # ── ML Service (FastAPI + XGBoost) ─────────────────────────────────────────

  ml-service:
    build:
      context: ../coverai-ml
      dockerfile: Dockerfile
      target: development
    container_name: coverai-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:        postgresql://coverai:coverai_secret@postgres:5432/coverai_db
      REDIS_URL:           redis://redis:6379/1
      KAFKA_BROKERS:       kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DEBUG:               "true"
      LOG_LEVEL:           INFO
      MODEL_VERSION:       v1.0.0
      ALLOWED_ORIGINS:     '["http://localhost:3000","http://localhost:3001"]'
    volumes:
      - ../coverai-ml:/app
      - ml_models:/app/data/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging

  # ── Backend (NestJS) ────────────────────────────────────────────────────────

  backend:
    build:
      context: ../coverai-backend
      dockerfile: Dockerfile
      target: development
    container_name: coverai-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV:             development
      PORT:                 3001
      DB_HOST:              postgres
      DB_PORT:              5432
      DB_USERNAME:          coverai
      DB_PASSWORD:          coverai_secret
      DB_NAME:              coverai_db
      DB_SYNCHRONIZE:       "true"
      REDIS_HOST:           redis
      REDIS_PORT:           6379
      KAFKA_BROKERS:        kafka:29092
      ML_SERVICE_URL:       http://ml-service:8000
      ML_SERVICE_TIMEOUT:   5000
      JWT_SECRET:           dev-jwt-secret-change-in-production-32chars
      JWT_REFRESH_SECRET:   dev-refresh-secret-change-in-production-32chars
      FRONTEND_URL:         http://localhost:3000
      RAZORPAY_KEY_ID:      rzp_test_placeholder
      RAZORPAY_KEY_SECRET:  placeholder_secret
    volumes:
      - ../coverai-backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    command: npm run start:dev
    logging: *default-logging

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────

  frontend:
    build:
      context: ../coverai-frontend
      dockerfile: Dockerfile.dev
    container_name: coverai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL:  http://localhost:3001/api/v1
      NEXT_PUBLIC_APP_URL:  http://localhost:3000
      WATCHPACK_POLLING:    "true"
    volumes:
      - ../coverai-frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging

  # ── Observability ───────────────────────────────────────────────────────────

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: coverai-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:             coverai-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on: [kafka]
    logging: *default-logging

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: coverai-redis-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on: [redis]
    logging: *default-logging

  # ── One-shot: Train ML model ─────────────────────────────────────────────
  train:
    build:
      context: ../coverai-ml
      dockerfile: Dockerfile
      target: development
    container_name: coverai-trainer
    profiles: ["train"]
    environment:
      DATABASE_URL:        postgresql://coverai:coverai_secret@postgres:5432/coverai_db
      REDIS_URL:           redis://redis:6379/1
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ../coverai-ml:/app
      - ml_models:/app/data/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python scripts/train.py --evaluate
    restart: "no"

volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:
  ml_models:
  mlflow_data:
