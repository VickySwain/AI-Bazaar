---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: coverai
  labels:
    app: backend
  annotations:
    prometheus.io/scrape: "true"
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: coverai
  labels:
    app: ml-service
  annotations:
    prometheus.io/scrape: "true"
spec:
  selector:
    app: ml-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: coverai
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
