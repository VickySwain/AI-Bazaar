---
# ServiceMonitor for NestJS backend (kube-prometheus-stack)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: coverai-monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: [coverai]
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
---
# ServiceMonitor for FastAPI ML service
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ml-service-monitor
  namespace: coverai-monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: [coverai]
  selector:
    matchLabels:
      app: ml-service
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
---
# PrometheusRule for critical alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: coverai-alerts
  namespace: coverai-monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: coverai.critical
      interval: 30s
      rules:
        # ML model fallback active
        - alert: MlModelFallbackActive
          expr: ml_model_loaded{namespace="coverai"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ML model not loaded — using rule-based fallback"
            description: "The XGBoost recommendation model has not been loaded for 5+ minutes. Predictions are falling back to rule-based scoring."

        # Backend error rate high
        - alert: BackendHighErrorRate
          expr: |
            rate(http_requests_total{namespace="coverai", job="backend", status=~"5.."}[5m])
            / rate(http_requests_total{namespace="coverai", job="backend"}[5m]) > 0.01
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Backend API error rate > 1%"
            description: "NestJS backend 5xx error rate is {{ $value | humanizePercentage }} over last 5 minutes."

        # ML service latency p99 > 500ms
        - alert: MlServiceHighLatency
          expr: |
            histogram_quantile(0.99,
              rate(http_request_duration_seconds_bucket{namespace="coverai", job="ml-service"}[5m])
            ) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ML inference p99 latency > 500ms"
            description: "ML service p99 latency is {{ $value }}s — recommendation quality may degrade."

        # Pod crash looping
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="coverai"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted more than once in the last 15 minutes."

        # Redis cache hit rate low
        - alert: LowCacheHitRate
          expr: |
            rate(redis_keyspace_hits_total[5m])
            / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m])) < 0.50
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Redis cache hit rate < 50%"
            description: "Cache efficiency has dropped. Current hit rate: {{ $value | humanizePercentage }}"

        # RDS connections near limit
        - alert: RdsConnectionsHigh
          expr: aws_rds_database_connections_average > 150
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "RDS connections > 150 (limit 200)"
            description: "PostgreSQL connections: {{ $value }}. Consider connection pooling via PgBouncer."
