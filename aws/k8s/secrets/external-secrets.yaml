# External Secrets Operator pulls secrets from AWS Secrets Manager.
# Install ESO first: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: coverai
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
# Backend secrets pulled from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  namespace: coverai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: coverai-prod/secrets
        property: jwt_secret
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: coverai-prod/secrets
        property: jwt_refresh_secret
    - secretKey: DB_PASSWORD
      remoteRef:
        key: coverai-prod/secrets
        property: db_password
    - secretKey: RAZORPAY_KEY_ID
      remoteRef:
        key: coverai-prod/secrets
        property: razorpay_key_id
    - secretKey: RAZORPAY_KEY_SECRET
      remoteRef:
        key: coverai-prod/secrets
        property: razorpay_key_secret
    - secretKey: RAZORPAY_WEBHOOK_SECRET
      remoteRef:
        key: coverai-prod/secrets
        property: razorpay_webhook
    - secretKey: SMTP_PASS
      remoteRef:
        key: coverai-prod/secrets
        property: sendgrid_api_key
    - secretKey: TWILIO_ACCOUNT_SID
      remoteRef:
        key: coverai-prod/secrets
        property: twilio_account_sid
    - secretKey: TWILIO_AUTH_TOKEN
      remoteRef:
        key: coverai-prod/secrets
        property: twilio_auth_token
---
# ML Service secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ml-secrets
  namespace: coverai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: ml-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: coverai-prod/secrets
        property: database_url
