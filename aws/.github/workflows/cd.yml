name: CD — Deploy to AWS EKS

on:
  workflow_run:
    workflows: ["CI — Test & Build"]
    types: [completed]
    branches: [main]

  # Manual deploy trigger with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options: [dev, staging, prod]
      backend_tag:
        description: 'Backend image tag (leave empty for latest)'
        required: false
      ml_tag:
        description: 'ML image tag (leave empty for latest)'
        required: false
      train_model:
        description: 'Run ML model training before deploy?'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION:   ap-south-1
  CLUSTER_NAME: coverai-prod-eks
  NAMESPACE:    coverai

jobs:
  # ── Gate: only deploy if CI passed ────────────────────────────────────────
  check-ci:
    name: Gate — CI Must Pass
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI status check
        run: echo "CI passed — proceeding with deployment"

  # ── ML Model Training (optional) ──────────────────────────────────────────
  train-model:
    name: ML — Train & Upload Model to S3
    runs-on: ubuntu-latest
    needs: check-ci
    if: github.event.inputs.train_model == 'true'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/coverai-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: coverai-ml/requirements.txt

      - name: Install ML dependencies
        working-directory: coverai-ml
        run: pip install -r requirements.txt

      - name: Train ML model
        working-directory: coverai-ml
        run: python scripts/train.py --users 10000 --no-mlflow
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          REDIS_URL: ${{ secrets.REDIS_URL_PROD }}
          MODEL_VERSION: ${{ github.sha }}

      - name: Upload model artefacts to S3
        working-directory: coverai-ml
        run: |
          BUCKET="coverai-prod-ml-artifacts"
          VERSION="${GITHUB_SHA::8}"

          for FILE in data/models/*.joblib data/models/*.json; do
            [ -f "$FILE" ] || continue
            BASENAME=$(basename "$FILE")
            aws s3 cp "$FILE" "s3://${BUCKET}/models/${BASENAME}"
            aws s3 cp "$FILE" "s3://${BUCKET}/history/${VERSION}/${BASENAME}"
            echo "Uploaded: ${BASENAME}"
          done
          echo "MODEL_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Notify Slack on training complete
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "🤖 ML model training ${{ job.status == 'success' && 'completed' || 'FAILED' }} for coverai v${{ github.sha }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # ── Deploy to EKS ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy — EKS (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    needs: [check-ci, train-model]
    if: always() && needs.check-ci.result == 'success'
    environment:
      name: ${{ github.event.inputs.environment || 'prod' }}
      url: https://coverai.in

    permissions:
      id-token: write
      contents: read

    concurrency:
      group: deploy-${{ github.event.inputs.environment || 'prod' }}
      cancel-in-progress: false   # Never cancel in-progress deploys

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/coverai-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Resolve image tags
        id: resolve-tags
        run: |
          ECR_BASE="${{ steps.ecr-login.outputs.registry }}"
          SHORT_SHA="${GITHUB_SHA::8}"

          # Use provided tag or fall back to SHA
          BACKEND_TAG="${{ github.event.inputs.backend_tag || format('{0}', env.SHORT_SHA) }}"
          FRONTEND_TAG="${{ github.event.inputs.backend_tag || format('{0}', env.SHORT_SHA) }}"
          ML_TAG="${{ github.event.inputs.ml_tag || format('{0}', env.SHORT_SHA) }}"

          echo "backend_image=${ECR_BASE}/coverai-backend:${BACKEND_TAG}"   >> $GITHUB_OUTPUT
          echo "frontend_image=${ECR_BASE}/coverai-frontend:${FRONTEND_TAG}" >> $GITHUB_OUTPUT
          echo "ml_image=${ECR_BASE}/coverai-ml:${ML_TAG}"                  >> $GITHUB_OUTPUT
          echo "Deploying: backend=${BACKEND_TAG} frontend=${FRONTEND_TAG} ml=${ML_TAG}"

      # ── Pre-deploy checks ─────────────────────────────────────────────────

      - name: Check cluster health
        run: |
          kubectl get nodes -o wide
          kubectl get pods -n ${{ env.NAMESPACE }} --no-headers | grep -v Running | grep -v Completed || echo "All pods healthy"

      - name: Verify images exist in ECR
        run: |
          for IMAGE in backend frontend ml; do
            aws ecr describe-images \
              --repository-name coverai-${IMAGE} \
              --image-ids imageTag="${GITHUB_SHA::8}" \
              --query 'imageDetails[0].imageSizeInBytes' \
              --output text && echo "✓ coverai-${IMAGE} exists" || echo "⚠ coverai-${IMAGE} using latest"
          done

      # ── Apply K8s manifests ───────────────────────────────────────────────

      - name: Apply namespaces
        run: kubectl apply -f k8s/namespaces/

      - name: Apply ConfigMaps
        run: kubectl apply -f k8s/configmaps/

      - name: Inject infrastructure endpoints as K8s Secret
        run: |
          # Fetch Terraform outputs from SSM Parameter Store
          # (populated by Terraform as part of infra provisioning)
          DB_HOST=$(aws ssm get-parameter --name /coverai/prod/db_host --query Parameter.Value --output text)
          REDIS_HOST=$(aws ssm get-parameter --name /coverai/prod/redis_host --query Parameter.Value --output text)
          KAFKA_BROKERS=$(aws ssm get-parameter --name /coverai/prod/kafka_brokers --query Parameter.Value --output text)

          kubectl create secret generic infra-endpoints \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=db_host="${DB_HOST}" \
            --from-literal=redis_host="${REDIS_HOST}" \
            --from-literal=kafka_brokers="${KAFKA_BROKERS}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply External Secrets (ESO)
        run: kubectl apply -f k8s/secrets/

      - name: Wait for secrets to sync
        run: |
          echo "Waiting for ExternalSecrets to sync..."
          for SECRET in backend-secrets ml-secrets; do
            kubectl wait externalsecret/$SECRET \
              --namespace=${{ env.NAMESPACE }} \
              --for=condition=Ready \
              --timeout=60s || echo "⚠ $SECRET sync timeout"
          done

      # ── Rolling deploys ───────────────────────────────────────────────────

      - name: Deploy ML Service (first — backend depends on it)
        run: |
          kubectl set image deployment/ml-service \
            ml-service=${{ steps.resolve-tags.outputs.ml_image }} \
            --namespace=${{ env.NAMESPACE }}
          kubectl rollout status deployment/ml-service \
            --namespace=${{ env.NAMESPACE }} \
            --timeout=300s

      - name: Deploy Backend
        run: |
          kubectl set image deployment/backend \
            backend=${{ steps.resolve-tags.outputs.backend_image }} \
            --namespace=${{ env.NAMESPACE }}
          kubectl rollout status deployment/backend \
            --namespace=${{ env.NAMESPACE }} \
            --timeout=300s

      - name: Deploy Frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ steps.resolve-tags.outputs.frontend_image }} \
            --namespace=${{ env.NAMESPACE }}
          kubectl rollout status deployment/frontend \
            --namespace=${{ env.NAMESPACE }} \
            --timeout=180s

      - name: Apply HPA and PDB
        run: kubectl apply -f k8s/hpa/

      - name: Apply Ingress
        run: kubectl apply -f k8s/ingress/

      - name: Apply Monitoring manifests
        run: kubectl apply -f k8s/monitoring/

      # ── Post-deploy verification ──────────────────────────────────────────

      - name: Wait for all pods to be Running
        run: |
          echo "Waiting for all pods to stabilise..."
          kubectl wait pods \
            --namespace=${{ env.NAMESPACE }} \
            --all \
            --for=condition=Ready \
            --timeout=300s

      - name: Smoke test — Backend health
        run: |
          # Port-forward for smoke test
          kubectl port-forward svc/backend 13001:3001 -n ${{ env.NAMESPACE }} &
          PF_PID=$!
          sleep 5
          STATUS=$(curl -sf http://localhost:13001/health/ping | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" 2>/dev/null)
          kill $PF_PID 2>/dev/null
          if [ "$STATUS" = "ok" ]; then
            echo "✓ Backend health check passed"
          else
            echo "✗ Backend health check FAILED: ${STATUS}"
            exit 1
          fi

      - name: Smoke test — ML Service health
        run: |
          kubectl port-forward svc/ml-service 18000:8000 -n ${{ env.NAMESPACE }} &
          PF_PID=$!
          sleep 5
          STATUS=$(curl -sf http://localhost:18000/health/ping | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" 2>/dev/null)
          kill $PF_PID 2>/dev/null
          if [ "$STATUS" = "ok" ]; then
            echo "✓ ML service health check passed"
          else
            echo "✗ ML service health check FAILED: ${STATUS}"
            exit 1
          fi

      - name: Print final pod status
        if: always()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
          echo ""
          echo "=== HPA Status ==="
          kubectl get hpa -n ${{ env.NAMESPACE }}

      # ── Rollback on failure ───────────────────────────────────────────────

      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠ Deployment failed — rolling back all services..."
          for DEPLOY in ml-service backend frontend; do
            kubectl rollout undo deployment/$DEPLOY --namespace=${{ env.NAMESPACE }} || true
          done
          kubectl rollout status deployment/backend \
            --namespace=${{ env.NAMESPACE }} --timeout=120s || true
          echo "Rollback complete. Check logs for root cause."

      - name: Notify Slack — deploy result
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} CoverAI deploy to *${{ github.event.inputs.environment || 'prod' }}* ${{ job.status }}",
              "attachments": [{
                "color": "${{ job.status == 'success' && 'good' || 'danger' }}",
                "fields": [
                  {"title": "Environment", "value": "${{ github.event.inputs.environment || 'prod' }}", "short": true},
                  {"title": "Commit", "value": "${{ github.sha }}", "short": true},
                  {"title": "Deployed by", "value": "${{ github.actor }}", "short": true},
                  {"title": "URL", "value": "https://coverai.in", "short": true}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
