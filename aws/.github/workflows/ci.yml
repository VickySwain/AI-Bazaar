name: CI — Test & Build

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: ap-south-1
  ECR_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend — Lint, Type-check, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coverai-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coverai
          POSTGRES_PASSWORD: test_secret
          POSTGRES_DB: coverai_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: coverai-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: coverai
          DB_PASSWORD: test_secret
          DB_NAME: coverai_test
          DB_SYNCHRONIZE: 'true'
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret-min-32-chars-xyzabc123
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-xyz
          ML_SERVICE_URL: http://localhost:8000

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: coverai-backend/dist
          retention-days: 1

  # ── Frontend Tests ─────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend — Lint, Type-check, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coverai-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: coverai-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.coverai.in/api/v1
          NEXT_PUBLIC_APP_URL: https://coverai.in

  # ── ML Service Tests ───────────────────────────────────────────────────────
  test-ml:
    name: ML Service — Lint, Type-check, Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coverai-ml

    services:
      redis:
        image: redis:7-alpine
        ports: ['6380:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: coverai-ml/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: pip install ruff && ruff check . || true

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --ignore=tests/test_api.py \
            -k "not slow" \
            --cov=ml --cov=app \
            --cov-report=xml \
            --cov-report=term-missing
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6380/1
          KAFKA_BROKERS: localhost:9092

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverai-ml/coverage.xml
          flags: ml-service
          fail_ci_if_error: false

  # ── Security Scan ──────────────────────────────────────────────────────────
  security-scan:
    name: Security — Trivy & SAST
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-ml]

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()

  # ── Build & Push Docker images ─────────────────────────────────────────────
  build-and-push:
    name: Docker — Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-ml, security-scan]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')

    permissions:
      id-token: write   # OIDC for keyless AWS auth
      contents: read

    outputs:
      backend_tag:  ${{ steps.tags.outputs.backend_tag }}
      frontend_tag: ${{ steps.tags.outputs.frontend_tag }}
      ml_tag:       ${{ steps.tags.outputs.ml_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/coverai-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          TIMESTAMP="$(date +%Y%m%d%H%M%S)"
          TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "backend_tag=${TAG}"  >> $GITHUB_OUTPUT
          echo "frontend_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "ml_tag=${TAG}"       >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./coverai-backend
          file: ./coverai-backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/coverai-backend:${{ steps.tags.outputs.backend_tag }}
            ${{ steps.ecr-login.outputs.registry }}/coverai-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./coverai-frontend
          file: ./coverai-frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/coverai-frontend:${{ steps.tags.outputs.frontend_tag }}
            ${{ steps.ecr-login.outputs.registry }}/coverai-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.coverai.in/api/v1
            NEXT_PUBLIC_APP_URL=https://coverai.in

      - name: Build & push ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./coverai-ml
          file: ./coverai-ml/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/coverai-ml:${{ steps.tags.outputs.ml_tag }}
            ${{ steps.ecr-login.outputs.registry }}/coverai-ml:latest
          cache-from: type=gha,scope=ml
          cache-to: type=gha,mode=max,scope=ml

      - name: Scan pushed images for vulnerabilities
        run: |
          for IMAGE in backend frontend ml; do
            echo "Scanning coverai-${IMAGE}:${{ steps.tags.outputs.backend_tag }}..."
            aws ecr describe-image-scan-findings \
              --repository-name coverai-${IMAGE} \
              --image-id imageTag=${{ steps.tags.outputs.backend_tag }} \
              --query 'imageScanFindings.findingSeverityCounts' \
              --output json || true
          done
